[testenv:no-cryptography]
description = Absent-cryptography code paths in identity/asymmetric
deps =
    pramanix[anthropic,gemini,mistral,cohere,llamacpp,audit,redis,kafka,infra,report]
    pytest
    pytest-asyncio
    pydantic
commands =
    pytest tests/ -k "no_cryptography or absent_cryptography" -v

[testenv:no-prometheus]
description = Absent-prometheus_client code paths in metrics
deps =
    pramanix[anthropic,gemini,mistral,cohere,llamacpp,audit,redis,kafka,infra,report]
    pytest
    pytest-asyncio
    pydantic
commands =
    pytest tests/ -k "no_prometheus or absent_prometheus" -v
