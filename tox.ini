# tox.ini — absent-package test environments for Pramanix
#
# These environments exist solely to test code paths that activate when an
# optional dependency is NOT installed.  They are NOT run in the normal
# pytest suite (which installs all extras).
#
# Usage:
#   tox -e no-mistral        # tests ConfigurationError on missing mistralai
#   tox -e no-cohere         # tests ConfigurationError on missing cohere
#   tox -e no-llamacpp       # tests ConfigurationError on missing llama-cpp-python
#   tox -e no-gemini         # tests ConfigurationError on missing google-generativeai
#   tox -e no-redis          # tests absent-redis code paths
#   tox -e no-kafka          # tests absent-kafka code paths
#   tox -e no-cryptography   # tests absent-cryptography code paths
#   tox -e no-prometheus     # tests absent-prometheus_client code paths
#
# Each environment installs pramanix[all] MINUS the package under test,
# then runs only the tests marked to run in that environment.
#
# Tests that target these environments carry:
#   @pytest.mark.skipif(
#       importlib.util.find_spec("pkg") is not None,
#       reason="run in tox:no-{pkg} — pkg is installed in this env",
#   )
# so they are automatically skipped in the full-extras dev environment.

[tox]
min_version = 4
env_list = no-mistral, no-cohere, no-llamacpp, no-gemini, no-redis, no-kafka, no-cryptography, no-prometheus

[testenv]
package = wheel
wheel_build_env = .pkg

[testenv:no-mistral]
description = ConfigurationError path when mistralai is not installed
deps =
    pramanix[anthropic,gemini,cohere,llamacpp,audit,redis,kafka,infra,report]
    pytest
    pytest-asyncio
    pydantic
commands =
    pytest tests/unit/test_llm_backends_real.py::TestMistralTranslatorReal::test_init_raises_config_error_without_package -v

[testenv:no-cohere]
description = ConfigurationError path when cohere is not installed
deps =
    pramanix[anthropic,gemini,mistral,llamacpp,audit,redis,kafka,infra,report]
    pytest
    pytest-asyncio
    pydantic
commands =
    pytest tests/unit/test_llm_backends_real.py::TestCohereTranslatorReal::test_init_raises_config_error_without_cohere -v

[testenv:no-llamacpp]
description = ConfigurationError path when llama-cpp-python is not installed
deps =
    pramanix[anthropic,gemini,mistral,cohere,audit,redis,kafka,infra,report]
    pytest
    pytest-asyncio
    pydantic
commands =
    pytest tests/unit/test_llm_backends_real.py::TestLlamaCppTranslatorReal::test_init_raises_config_error_without_llama_cpp -v

[testenv:no-gemini]
description = ConfigurationError path when google-generativeai is not installed
deps =
    pramanix[anthropic,mistral,cohere,llamacpp,audit,redis,kafka,infra,report]
    pytest
    pytest-asyncio
    pydantic
commands =
    pytest tests/integration/test_gemini_translator.py::test_gemini_missing_package_raises_configuration_error -v

[testenv:no-redis]
description = Absent-redis code paths in cache/token backends
deps =
    pramanix[anthropic,gemini,mistral,cohere,llamacpp,audit,kafka,infra,report]
    pytest
    pytest-asyncio
    pydantic
commands =
    pytest tests/ -k "no_redis or absent_redis" -v

[testenv:no-kafka]
description = Absent-kafka code paths in KafkaAuditSink
deps =
    pramanix[anthropic,gemini,mistral,cohere,llamacpp,audit,redis,infra,report]
