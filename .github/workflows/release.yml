# SPDX-License-Identifier: AGPL-3.0-only
# Pramanix SLSA Level 3 Release Pipeline â€” v0.5
#
# Trigger: git tag matching v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-rc.<n>
#
# Steps (in order):
#   1. Version consistency check  â€” pyproject.toml == git tag == __version__
#   2. Build                      â€” poetry build + twine check
#   3. SBOM generation            â€” CycloneDX JSON
#   4. OIDC publish to PyPI       â€” GitHub OIDC, no API token in secrets
#   5. Sigstore artifact signing  â€” .sigstore.json per artifact
#   6. GitHub Release             â€” CHANGELOG section as body, all artifacts attached
#   7. Post-release smoke test    â€” clean venv, pip install, basic import
#
# Permissions:
#   id-token:write    â€” GitHub OIDC for PyPI trusted publishing
#   contents:write    â€” create GitHub Release
#   attestations:write â€” Sigstore attestation upload

name: Release (SLSA Level 3)

on:
  push:
    tags:
      # Release tags:  v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+"
      # RC tags:       v1.2.3-rc.1
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  id-token: write
  contents: write
  attestations: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  release:
    name: "Release ${{ github.ref_name }}"
    runs-on: ubuntu-latest

    steps:
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Checkout with full history so CHANGELOG section extraction works
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # STEP 1 â€” Version Consistency Check
      # Assert pyproject.toml == git tag == __version__ == CHANGELOG entry
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: "Step 1/7 â€” Version consistency check"
        run: |
          # Strip leading 'v' from git tag
          GIT_TAG="${{ github.ref_name }}"
          VERSION="${GIT_TAG#v}"
          echo "Verifying version: $VERSION (tag: $GIT_TAG)"

          # 1a. pyproject.toml
          PYPROJECT_VERSION=$(python - <<'PYEOF'
          import re, sys
          content = open("pyproject.toml").read()
          m = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not m:
              print("ERROR: could not parse version from pyproject.toml", file=sys.stderr)
              sys.exit(1)
          print(m.group(1))
          PYEOF
          )
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [[ "$PYPROJECT_VERSION" != "$VERSION" ]]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VERSION, tag=$VERSION"
            echo "Fix: update [tool.poetry] version in pyproject.toml before tagging."
            exit 1
          fi

          # 1b. src/pramanix/__init__.py __version__
          INIT_VERSION=$(python -c "
          import re, sys
          content = open('src/pramanix/__init__.py').read()
          m = re.search(r'__version__\s*=\s*[\"\']([\d.]+(?:-rc\.\d+)?)[\"\'\"']', content)
          if not m:
              print('ERROR: __version__ not found', file=sys.stderr)
              sys.exit(1)
          print(m.group(1))
          ")
          echo "__init__.py __version__: $INIT_VERSION"
          if [[ "$INIT_VERSION" != "$VERSION" ]]; then
            echo "::error::Version mismatch: __init__.py=$INIT_VERSION, tag=$VERSION"
            echo "Fix: update __version__ in src/pramanix/__init__.py before tagging."
            exit 1
          fi

          # 1c. CHANGELOG.md contains section for this version
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md 2>/dev/null && \
             ! grep -qF "## ${VERSION}" CHANGELOG.md 2>/dev/null; then
            echo "::error::CHANGELOG.md does not contain a section for version $VERSION"
            echo "Fix: add '## [$VERSION] - $(date +%Y-%m-%d)' section to CHANGELOG.md"
            exit 1
          fi

          echo "âœ“ All version checks passed: $VERSION"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "GIT_TAG=$GIT_TAG" >> "$GITHUB_ENV"
          # Detect RC tags
          if [[ "$GIT_TAG" == *"-rc."* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
            echo "PYPI_TARGET=testpypi" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
            echo "PYPI_TARGET=pypi" >> "$GITHUB_ENV"
          fi

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # STEP 2 â€” Build
      # poetry build â†’ twine check â†’ wheel purity verification
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: "Step 2/7 â€” Build wheel and sdist"
        run: |
          pip install poetry twine
          poetry build

          echo "=== Build artifacts ==="
          ls -lh dist/

          echo "--- twine check ---"
          twine check dist/*

          echo "--- Wheel purity check ---"
          # Pure-Python wheel contains no compiled extensions
          for WHL in dist/*.whl; do
            echo "Checking: $WHL"
            python - "$WHL" <<'PYEOF'
          import zipfile, sys, os
          whl = sys.argv[1]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
          exts = [n for n in names if n.endswith(('.so', '.pyd', '.dll'))]
          if exts:
              print(f"WARNING: compiled extensions found in wheel: {exts}", file=sys.stderr)
              # Not a hard failure â€” z3-solver ships native lib; pramanix itself is pure Python
          else:
              print(f"âœ“ Pure Python wheel confirmed: {os.path.basename(whl)}")
          PYEOF
          done

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # STEP 3 â€” SBOM Generation (CycloneDX)
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: "Step 3/7 â€” Generate CycloneDX SBOM"
        run: |
          pip install cyclonedx-bom

          # Install the package so cyclonedx-py can enumerate its deps
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --extras all

          cyclonedx-py poetry \
            --output pramanix-sbom.cdx.json \
            --format json

          echo "=== SBOM summary ==="
          python - <<'PYEOF'
          import json
          with open("pramanix-sbom.cdx.json") as f:
              sbom = json.load(f)
          components = sbom.get("components", [])
          print(f"SBOM contains {len(components)} component(s)")
          # Verify key direct deps are present
          names = {c.get("name","").lower() for c in components}
          required = {"pydantic", "z3-solver", "structlog"}
          missing = required - names
          if missing:
              print(f"WARNING: expected components not found in SBOM: {missing}")
          else:
              print(f"âœ“ All required direct dependencies found in SBOM")
          PYEOF

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: pramanix-sbom
          path: pramanix-sbom.cdx.json

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # STEP 4 â€” OIDC Publish to PyPI (no API token â€” GitHub OIDC identity)
      # RC tags â†’ Test PyPI; release tags â†’ production PyPI
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: "Step 4a/7 â€” Publish to Test PyPI (RC tags only)"
        if: env.IS_PRERELEASE == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          verbose: true

      - name: "Step 4b/7 â€” Publish to PyPI (release tags only)"
        if: env.IS_PRERELEASE == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
          verbose: true

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # STEP 5 â€” Sigstore Artifact Signing
      # Signs .whl and .tar.gz; produces .sigstore.json bundles
      # Bundle proves: artifact hash + GitHub Actions workflow + commit SHA
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: "Step 5/7 â€” Sign artifacts with Sigstore"
        uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46  # v3.0.0
        with:
          inputs: >-
            dist/*.whl
            dist/*.tar.gz

      - name: Verify sigstore bundles were created
        run: |
          echo "=== Signed artifacts ==="
          ls -lh dist/
          # Confirm .sigstore.json bundles exist for each artifact
          for artifact in dist/*.whl dist/*.tar.gz; do
            bundle="${artifact}.sigstore.json"
            if [[ ! -f "$bundle" ]]; then
              echo "::error::Missing sigstore bundle for: $artifact"
              exit 1
            fi
            echo "âœ“ $bundle"
          done

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # STEP 6 â€” GitHub Release
      # Extract CHANGELOG section for this version as release body
      # Attach: wheel, sdist, sigstore bundles, SBOM
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: "Step 6/7 â€” Extract CHANGELOG section"
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          # Extract the section between ## [VERSION] and the next ## heading
          NOTES=$(sed -n "/^## \[${VERSION}\]\|^## ${VERSION}/,/^## /{ /^## ${VERSION}\|^## \[${VERSION}\]/!{ /^## /d; p } }" CHANGELOG.md)
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file for the release action (avoids shell escaping issues)
          echo "$NOTES" > release-notes.md
          echo "=== Release notes preview ==="
          head -20 release-notes.md

      - name: "Step 6/7 â€” Create GitHub Release"
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.1.0
        with:
          tag_name: ${{ env.GIT_TAG }}
          name: "Pramanix ${{ env.RELEASE_VERSION }}"
          body_path: release-notes.md
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore.json
            pramanix-sbom.cdx.json
          fail_on_unmatched_files: true

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # STEP 7 â€” Post-Release Smoke Test
      # Clean ubuntu runner, pip install from PyPI, basic import
      # Uses 120s CDN propagation wait before installing
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: "Step 7/7 â€” Post-release smoke test"
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          PYPI_TARGET="${{ env.PYPI_TARGET }}"

          if [[ "$PYPI_TARGET" == "testpypi" ]]; then
            INDEX_URL="https://test.pypi.org/simple/"
            EXTRA_INDEX="--extra-index-url https://pypi.org/simple/"
          else
            INDEX_URL="https://pypi.org/simple/"
            EXTRA_INDEX=""
          fi

          echo "Waiting 120s for PyPI CDN propagation..."
          sleep 120

          # Create a clean virtual environment
          python -m venv /tmp/smoke-venv
          source /tmp/smoke-venv/bin/activate

          echo "--- Installing pramanix==$VERSION ---"
          pip install --index-url "$INDEX_URL" $EXTRA_INDEX "pramanix==$VERSION"

          echo "--- Basic import smoke test ---"
          python -c "from pramanix import Guard, Policy, Field, E, Decision; print('OK')"

          echo "--- Installing pramanix[all]==$VERSION ---"
          pip install --index-url "$INDEX_URL" $EXTRA_INDEX "pramanix[all]==$VERSION"

          echo "--- Full extras smoke test ---"
          python -c "
          from pramanix import Guard, Policy, Field, E, Decision
          from pramanix.translator import Translator, TranslatorContext
          print('pramanix[all] import OK')
          "

          echo "âœ“ Post-release smoke test passed for pramanix==$VERSION"

