# SPDX-License-Identifier: AGPL-3.0-only
# Pramanix Iron Gate CI Pipeline — v0.7
#
# Job execution order (dependency chain — fail-fast at each gate):
#   sast → alpine-ban → lint-typecheck → test → coverage → wheel-smoke → trivy → license-scan
#
# Security rationale:
#   SAST first: reject known-CVE deps before ANY test code runs.
#   Alpine ban second: reject musl builds before compilation/install.
#   Lint/type third: reject broken code before spending compute on tests.
#   Tests fourth: full adversarial + property suite, ordered unit→integ→prop→adv.
#   Coverage fifth: enforce 95% floor; fail PRs that drop > 0.5%.
#   Wheel-smoke sixth: build wheel + sdist and install into a clean venv — catches
#     missing manifest files and accidentally-optional runtime deps before PyPI publish.
#   Trivy seventh: container image CVE scan — fail on CRITICAL/HIGH.
#   License last: expensive scan runs only after everything else passes.
#
# Nightly benchmark (schedule trigger):
#   Runs latency_benchmark.py at 02:00 UTC; enforces P99 < 15ms gate.
#
# CRITICAL: Alpine base images are BANNED — Z3 requires glibc (Blueprint §48).
# CRITICAL: Python 3.12 and below dropped — minimum is Python 3.13.
# Matrix: ubuntu-latest × Python 3.13

name: Pramanix CI

on:
  push:
    branches: ["main", "dev", "feature/**", "fix/**"]
  pull_request:
    branches: ["main"]
  schedule:
    # Nightly benchmark — 02:00 UTC
    - cron: "0 2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  # Pin pip to avoid resolver regressions
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1 — SAST: Static Application Security Testing
# Runs BEFORE any test job so known-CVE dependencies are rejected fast.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  sast:
    name: "SAST (pip-audit · bandit · semgrep)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Always use the latest pip for security patches.
      # This must run before pip-audit so the scanner sees a clean pip.
      - name: Upgrade pip
        run: pip install --upgrade pip

      # Install audit tools in isolation to avoid dependency conflicts.
      # semgrep is NOT installed via pip — it uses the official action below.
      - name: Install pip-audit
        run: pip install "pip-audit>=2.7"

      - name: Install bandit
        run: pip install "bandit>=1.7"

      # Poetry 2.x dropped the built-in `export` command — requires the plugin.
      # We install the project deps into the environment, then pip-audit scans
      # the live environment directly (no requirements.txt intermediate file).
      - name: Install project dependencies for scanning
        run: |
          pip install poetry "poetry-plugin-export>=1.6"
          poetry config virtualenvs.create false
          poetry check --lock
          poetry install --extras all --with dev

      - name: pip-audit — fail on any known CVE
        # Scans the live installed environment — no requirements.txt needed.
        # To accept a specific CVE finding that you have reviewed and accepted,
        # add --ignore-vuln VULN-ID to the command below and document the
        # rationale in a comment.  Example (do not uncomment without a real CVE):
        #   --ignore-vuln GHSA-0000-0000-0000  # Accepted: only affects feature X we don't use
        run: pip-audit --format=json --output pip-audit-report.json

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      - name: bandit — fail on HIGH severity findings
        # -ll = HIGH and CRITICAL only (suppress LOW/MEDIUM noise)
        # -ii = only MEDIUM and HIGH confidence (suppress speculative findings)
        run: bandit -r src/pramanix/ -ll -ii -f json -o bandit-report.json

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      # semgrep uses its official action — no pip install required, handles
      # binary download and rule fetching internally.
      - name: semgrep — fail on ERROR level findings
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── Secrets scan — fail if PRAMANIX_HMAC_SECRET or similar tokens ──────
      # Scans Python and YAML source files for hardcoded credentials.
      # Test files are excluded (they use test-only ephemeral keys via secrets.token_bytes).
      # Any match → rebuild fails to prevent secrets leaking into version control.
      - name: Secrets scan — no hardcoded credentials in source
        run: |
          FAIL=0

          # Pattern: any assignment of a secrets-like env var to a string literal
          BANNED_PATTERNS=(
            'PRAMANIX_HMAC_SECRET\s*='
            'PRAMANIX_API_KEY\s*='
            'PRAMANIX_LLM_API_KEY\s*='
            'openai_api_key\s*=\s*"[a-zA-Z0-9]'
            'anthropic_api_key\s*=\s*"[a-zA-Z0-9]'
          )

          for PATTERN in "${BANNED_PATTERNS[@]}"; do
            HITS=$(grep -rn -E "$PATTERN" \
              --include="*.py" --include="*.yml" --include="*.yaml" --include="*.toml" \
              --exclude-dir=tests \
              --exclude-dir=.venv \
              --exclude-dir=.github \
              --exclude-dir=__pycache__ \
              . 2>/dev/null || true)
            if [[ -n "$HITS" ]]; then
              echo "::error::FATAL: hardcoded credential pattern '${PATTERN}' detected:"
              echo "$HITS"
              FAIL=1
            fi
          done

          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "Secrets MUST be injected via environment variables or GitHub Secrets."
            echo "See docs/security.md for the Secrets & Configuration Security section."
            exit 1
          fi
          echo "✓ Secrets scan: no hardcoded credentials detected in source files."

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Alpine & musl Ban
  # Z3 requires glibc — musl causes segfaults and 3-10x slowdowns (Blueprint §48)
  # Gate: grep exits 0 (0 matches found = safe). 1 match = FATAL.
  # ──────────────────────────────────────────────────────────────────────────
  alpine-ban:
    name: "Reject Alpine / musl base images"
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v4

      - name: Scan Dockerfiles for Alpine / musl
        run: |
          # Collect all Dockerfiles, excluding:
          #   - .git/ (git internals)
          #   - Dockerfile.test (known test fixture — intentionally contains Alpine
          #     to verify this gate catches it during local development)
          mapfile -t DOCKERFILES < <(
            find . \
              \( -name "Dockerfile*" -o -name "*.dockerfile" -o -name "*.Dockerfile" \) \
              ! -path "./.git/*" \
              ! -name "Dockerfile.test" \
              2>/dev/null
          )
          echo "Scanning ${#DOCKERFILES[@]} Dockerfile(s):"
          printf '  %s\n' "${DOCKERFILES[@]}"

          HITS=()
          for f in "${DOCKERFILES[@]}"; do
            # Match any FROM that references alpine or musl in image name/tag
            if grep -iqE "FROM[[:space:]]+(--platform=[^[:space:]]+[[:space:]]+)?[^[:space:]]*(alpine|musl)" "$f" 2>/dev/null; then
              HITS+=("$f")
            fi
          done

          if [[ ${#HITS[@]} -gt 0 ]]; then
            echo "::error::FATAL: Alpine/musl base image detected in:"
            printf '  %s\n' "${HITS[@]}"
            echo ""
            echo "Alpine uses musl libc which breaks z3-solver native extensions."
            echo "Symptoms: segfaults, 3-10x slowdowns, non-deterministic BLOCK decisions."
            echo "Fix: Use python:3.13-slim-bookworm (Debian/glibc) instead."
            exit 1
          fi
          # Gate: exit 0 = no alpine found = safe
          echo "✓ Alpine/musl ban: 0 matches found in ${#DOCKERFILES[@]} Dockerfile(s). SAFE."

      - name: Scan docker-compose files for Alpine / musl
        run: |
          mapfile -t COMPOSE_FILES < <(
            find . \
              \( -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \) \
              ! -path "./.git/*" \
              2>/dev/null
          )
          if [[ ${#COMPOSE_FILES[@]} -eq 0 ]]; then
            echo "✓ No docker-compose files found. SAFE."
            exit 0
          fi
          HITS=()
          for f in "${COMPOSE_FILES[@]}"; do
            grep -iqE "(alpine|musl)" "$f" 2>/dev/null && HITS+=("$f")
          done
          if [[ ${#HITS[@]} -gt 0 ]]; then
            echo "::error::FATAL: Alpine/musl reference in docker-compose files:"
            printf '  %s\n' "${HITS[@]}"
            exit 1
          fi
          echo "✓ docker-compose scan: 0 matches in ${#COMPOSE_FILES[@]} file(s). SAFE."

      - name: Scan deploy/ directory for Alpine / musl
        run: |
          if [[ ! -d "./deploy" ]]; then
            echo "✓ No deploy/ directory found. SAFE."
            exit 0
          fi
          HITS=$(grep -rl -i -E "(alpine|musl)" ./deploy/ 2>/dev/null || true)
          if [[ -n "$HITS" ]]; then
            echo "::error::FATAL: Alpine/musl reference in deploy/ directory:"
            echo "$HITS"
            exit 1
          fi
          echo "✓ deploy/ scan: 0 matches. SAFE."

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Lint & Type Check
  # ruff check + ruff format + mypy --strict
  # All three exit 0 required — no warnings suppressed.
  # ──────────────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: "Lint (ruff) + Type check (mypy)"
    runs-on: ubuntu-latest
    needs: alpine-ban
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --with dev

      - name: ruff check — linting
        run: ruff check src/ tests/ --output-format=github

      - name: ruff format — formatting
        run: ruff format --check src/ tests/

      - name: mypy — strict type checking
        run: mypy src/pramanix/ --strict --no-error-summary

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Test Gauntlet
  # Ordered: unit → integration → property → adversarial → perf (main only)
  # Matrix: Python 3.13
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (all extras)
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --with dev --extras all

      - name: "Step 1/5 — Unit tests"
        run: pytest tests/unit/ -x --tb=short

      - name: "Step 2/5 — Integration tests"
        run: pytest tests/integration/ -x --tb=short

      - name: "Step 3/5 — Property-based tests"
        run: |
          pytest tests/property/ \
            --hypothesis-seed=0 \
            --hypothesis-profile=ci \
            -x --tb=short

      - name: "Step 4/5 — Adversarial security tests (always run)"
        run: pytest tests/adversarial/ -v --tb=short

      - name: "Step 5/5 — Perf benchmarks (main branch only)"
        if: github.ref == 'refs/heads/main'
        run: pytest tests/perf/ -m "not slow" --tb=short

      - name: "Step 5/5 — Perf benchmarks (PR: non-slow only)"
        if: github.ref != 'refs/heads/main' && github.event_name == 'pull_request'
        run: pytest tests/perf/ -m "not slow" --tb=short
        continue-on-error: true

      - name: Generate coverage report (Python 3.13 only)
        if: matrix.python-version == '3.13'
        run: |
          pytest \
            --cov=src/pramanix \
            --cov-branch \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            tests/unit/ tests/integration/ tests/property/ tests/adversarial/

      - name: Upload coverage artifact (Python 3.13 only)
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5 — Coverage Gate
  # Enforces ≥95% branch coverage and Codecov delta < -0.5%.
  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: "Coverage gate (≥95%, delta ≤-0.5%)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install coverage
        run: pip install coverage[toml]

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Enforce coverage threshold (≥95%)
        run: coverage report --fail-under=95

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          name: pramanix-coverage
          fail_ci_if_error: true
          # Coverage delta threshold (>0.5% drop → PR fails) is enforced
          # via codecov.yml in the repo root (coverage.precision + coverage.status)

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 7 — Container Image Security Scan (Trivy)
  # Builds the production Docker image and scans for CRITICAL/HIGH CVEs.
  # Fails if any CRITICAL or HIGH vulnerability is found.
  # ──────────────────────────────────────────────────────────────────────────
  trivy:
    name: "Container scan (Trivy)"
    runs-on: ubuntu-latest
    needs: extras-smoke
    steps:
      - uses: actions/checkout@v4

      - name: Build production image for scanning
        run: docker build -f Dockerfile.production -t pramanix:ci-scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "pramanix:ci-scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 7 — Dependency License Scan
  # Allowed: MIT, Apache-2.0, BSD-2/3, LGPL-2.1/3.0, PSF, ISC, MPL-2.0
  # Blocked: GPL-2.0-only, AGPL-incompatible, unknown
  # ──────────────────────────────────────────────────────────────────────────
  license-scan:
    name: "License scan (allowlist)"
    runs-on: ubuntu-latest
    needs: trivy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime dependencies + license tool
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --extras all
          pip install pip-licenses

      - name: Generate license report
        run: pip-licenses --format=json --output-file=licenses.json --with-urls

      - name: Enforce license allowlist
        run: |
          python - <<'PYEOF'
          import json, sys

          ALLOWLIST = {
              "MIT",
              "Apache Software License",
              "Apache-2.0",
              "BSD License",
              "BSD-2-Clause",
              "BSD-3-Clause",
              "GNU Lesser General Public License v2 (LGPLv2)",
              "GNU Lesser General Public License v2 or later (LGPLv2+)",
              "GNU Lesser General Public License v3 (LGPLv3)",
              "LGPL-2.1",
              "LGPL-2.1-or-later",
              "LGPL-3.0",
              "LGPL-3.0-or-later",
              "Python Software Foundation License",
              "PSF",
              "ISC",
              "ISC License (ISCL)",
              "Mozilla Public License 2.0 (MPL 2.0)",
              "MPL-2.0",
              # Pramanix itself — AGPL is the project license, not a dependency
              "GNU Affero General Public License v3",
              "AGPL-3.0-only",
          }

          BLOCKED_PATTERNS = [
              "GPL-2.0-only",
              "GNU General Public License v2 (GPLv2)",
              "UNKNOWN",
          ]

          with open("licenses.json") as f:
              packages = json.load(f)

          violations = []
          for pkg in packages:
              name = pkg.get("Name", "")
              lic = pkg.get("License", "UNKNOWN").strip()

              # Skip packages with explicitly allowed licenses
              if lic in ALLOWLIST:
                  continue

              # Fail on explicitly blocked patterns
              for blocked in BLOCKED_PATTERNS:
                  if blocked.lower() in lic.lower():
                      violations.append(f"  BLOCKED  [{name}]  {lic}")
                      break
              else:
                  # Not in allowlist and not blocked — treat as unknown/review needed
                  violations.append(f"  UNKNOWN  [{name}]  {lic}")

          if violations:
              print("::error::License violations detected:")
              print("\n".join(violations))
              print("\nAllowlist:", sorted(ALLOWLIST))
              sys.exit(1)

          print(f"✓ License scan passed. {len(packages)} package(s) checked.")
          PYEOF

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 8 — Wheel / sdist install smoke gate
  #
  # Builds the distribution artifacts with `poetry build`, then installs the
  # wheel into a *clean* virtual environment (no source tree, no dev deps) and
  # verifies that the public API imports correctly.
  #
  # Why this is needed:
  #   The test job uses `poetry install` (editable, with all extras and dev
  #   deps).  It cannot catch:
  #     - A missing file in the wheel/sdist (MANIFEST/packages mis-config)
  #     - A runtime dependency accidentally marked `optional = true`
  #     - An import that works from src/ but fails from the installed package
  #   All of these would reach PyPI and break every user's first `pip install`.
  #
  # Gate: must run after `coverage` so it only triggers on a healthy build.
  # ──────────────────────────────────────────────────────────────────────────
  wheel-smoke:
    name: "Wheel install smoke (clean venv)"
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel and sdist
        run: |
          pip install poetry
          poetry build
          echo "Built artifacts:"
          ls -lh dist/

      - name: Install wheel into a clean virtual environment
        # Deliberately does NOT install dev or test dependencies.
        # Uses --no-cache-dir to prove the wheel is self-contained.
        run: |
          python -m venv /tmp/pramanix-smoke-venv
          /tmp/pramanix-smoke-venv/bin/pip install --no-cache-dir \
            dist/pramanix-*.whl

      - name: Verify core public API is importable from the installed wheel
        run: |
          /tmp/pramanix-smoke-venv/bin/python - <<'PYEOF'
          # Import every name that is guaranteed stable in pramanix.__all__.
          # If any import fails here, the wheel is broken for end users.
          from pramanix import (
              Guard,
              GuardConfig,
              Policy,
              Field,
              E,
              Decision,
              SolverStatus,
              PramanixError,
              GuardViolationError,
              ConfigurationError,
              ExecutionToken,
              ExecutionTokenSigner,
              ExecutionTokenVerifier,
          )
          import pramanix

          # Verify __version__ is present and non-empty
          assert hasattr(pramanix, "__version__") and pramanix.__version__, (
              "__version__ missing from installed wheel"
          )

          # Verify __all__ is present and non-empty
          assert hasattr(pramanix, "__all__") and pramanix.__all__, (
              "__all__ missing from installed wheel"
          )

          # Verify the Guard class is functional (no missing C-extension or data file)
          from pydantic import BaseModel
          from decimal import Decimal

          class _Intent(BaseModel):
              amount: Decimal

          class _State(BaseModel):
              balance: Decimal
              state_version: str = "v1"

          policy = Policy(
              name="smoke",
              version="v1",
              intent_model=_Intent,
              state_model=_State,
              invariants=[Field("amount") <= Field("balance")],
          )
          guard = Guard(policy)
          decision = guard.verify(
              intent={"amount": Decimal("1")},
              state={"balance": Decimal("100"), "state_version": "v1"},
          )
          assert decision.allowed, f"Smoke verify failed: {decision.status}"

          print(f"Wheel smoke passed  version={pramanix.__version__}  "
                f"exports={len(pramanix.__all__)}")
          PYEOF

      - name: Verify sdist is installable (build from source)
        # Installs from the .tar.gz to catch missing source files that the
        # wheel build step pre-compiles and therefore silently hides.
        run: |
          python -m venv /tmp/pramanix-sdist-venv
          /tmp/pramanix-sdist-venv/bin/pip install --no-cache-dir \
            dist/pramanix-*.tar.gz
          /tmp/pramanix-sdist-venv/bin/python -c \
            "import pramanix; print('sdist smoke passed', pramanix.__version__)"

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 9 — Extras install smoke
  # Installs the wheel with each advertised extras combination and verifies
  # that the key modules are importable.  Catches broken extras before any
  # PyPI publish.  Runs after wheel-smoke so the wheel is already validated.
  # ──────────────────────────────────────────────────────────────────────────
  extras-smoke:
    name: "Extras install smoke (all advertised extras)"
    runs-on: ubuntu-latest
    needs: wheel-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel
        run: |
          pip install poetry
          poetry build

      - name: Smoke-test every advertised extra
        # Creates an isolated venv per extra, installs the wheel with that
        # extra, then verifies the key modules are importable.
        # Failures are collected and reported together so you can see all
        # broken extras in one run instead of stopping at the first one.
        run: |
          python - <<'PYEOF'
          import glob, os, subprocess, sys, tempfile, venv as _venv

          wheel = glob.glob("dist/pramanix-*.whl")[0]

          # Map: extra name -> list of Python import paths to verify
          EXTRAS: dict[str, list[str]] = {
              "translator":  ["httpx", "openai", "anthropic", "tenacity"],
              "otel":        ["opentelemetry.sdk", "opentelemetry.exporter.otlp.proto.grpc"],
              "fastapi":     ["fastapi", "starlette"],
              "langchain":   ["langchain_core"],
              "identity":    ["redis"],
              "audit":       ["fpdf"],
              "crypto":      ["cryptography"],
              "aws":         ["boto3"],
              "azure":       ["azure.identity", "azure.keyvault.secrets"],
              "gcp":         ["google.cloud.secretmanager"],
              "vault":       ["hvac"],
              "kafka":       ["confluent_kafka"],
              "datadog":     ["datadog_api_client"],
              "splunk":      ["httpx"],
              "pdf":         ["fpdf"],
          }

          failures: list[str] = []

          for extra, modules in EXTRAS.items():
              venv_dir = tempfile.mkdtemp(prefix=f"pramanix-smoke-{extra}-")
              _venv.create(venv_dir, with_pip=True)
              pip = os.path.join(venv_dir, "bin", "pip")
              python = os.path.join(venv_dir, "bin", "python")

              install = subprocess.run(
                  [pip, "install", "--no-cache-dir", "--quiet", f"{wheel}[{extra}]"],
                  capture_output=True,
                  text=True,
              )
              if install.returncode != 0:
                  failures.append(
                      f"[{extra}] INSTALL FAILED:\n{install.stderr[-800:]}"
                  )
                  continue

              for mod in modules:
                  chk = subprocess.run(
                      [python, "-c", f"import {mod}"],
                      capture_output=True,
                      text=True,
                  )
                  if chk.returncode != 0:
                      failures.append(
                          f"[{extra}] IMPORT FAILED — {mod}:\n{chk.stderr[-400:]}"
                      )
                  else:
                      print(f"  OK  [{extra}] {mod}")

          if failures:
              print("\n::error::Extras smoke failures detected:")
              for msg in failures:
                  print(f"\n  {msg}")
              sys.exit(1)

          print(f"\n✓ All {len(EXTRAS)} extras passed import smoke ({sum(len(v) for v in EXTRAS.values())} module checks).")
          PYEOF

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 10 — Nightly Latency Benchmark
  # Runs only on the schedule trigger (02:00 UTC daily).
  # Enforces P99 < 15ms gate — fails the job if the target is missed.
  # ──────────────────────────────────────────────────────────────────────────
  benchmark:
    name: "Nightly latency benchmark (P99 < 15ms)"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --extras all

      - name: Run latency benchmark (N=500)
        run: python benchmarks/latency_benchmark.py --n 500

      - name: Enforce P99 < 15ms gate
        run: |
          python - <<'PYEOF'
          import json, sys
          with open("benchmarks/results/latency_results.json") as f:
              d = json.load(f)
          p99 = d["p99_ms"]
          if p99 >= 15.0:
              print(f"::error::P99 REGRESSION: {p99:.2f}ms >= 15ms gate")
              sys.exit(1)
          print(f"P99 gate passed: {p99:.2f}ms < 15ms")
          PYEOF

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/latency_results.json

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 11 — Real-infrastructure integration tests (testcontainers)
  #
  # Runs against real Docker containers (Kafka, Postgres, Redis, Vault,
  # LocalStack/S3).  GitHub-hosted ubuntu-latest runners have Docker
  # pre-installed, so testcontainers works without any additional setup.
  #
  # Tests that require live cloud accounts (Azure KeyVault, Gemini, Cohere,
  # LlamaCpp with a GGUF model) are env-gated: they are skipped automatically
  # when the corresponding environment variables are absent.
  #
  # This job runs on every push/PR (not schedule) and does NOT gate the main
  # test job — it is advisory for contributor PRs but required before merge.
  # ──────────────────────────────────────────────────────────────────────────
  integration:
    name: "Integration tests (real infra — testcontainers)"
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install poetry
        run: pip install poetry

      # Install the SDK with all optional extras so every integration module
      # can be imported.  Then install integration-test-only deps on top.
      - name: Install project + all extras
        run: |
          poetry config virtualenvs.create false
          poetry install --extras all

      - name: Install integration test dependencies
        run: |
          pip install \
            "testcontainers[kafka,postgres,redis,localstack]>=4.0" \
            "hvac>=2.0" \
            "asyncpg>=0.29" \
            "confluent-kafka>=2.3" \
            "boto3>=1.34" \
            "cohere>=5.0" \
            "google-generativeai>=0.7" \
            "respx>=0.21" \
            "pytest-timeout>=0.5" \
            "docker>=6.0"

      # TESTCONTAINERS_RYUK_DISABLED avoids a second Docker-in-Docker layer on
      # GitHub Actions runners where Ryuk (container cleanup daemon) would need
      # elevated privileges that are unavailable.
      - name: Run integration tests
        env:
          PYTHONPATH: src
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          pytest tests/integration/ -v \
            --timeout=300 \
            --tb=short \
            -p no:cacheprovider \
            2>&1 | tee integration-results.txt
        # Exit code forwarded even through tee via pipefail
        shell: bash

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-results.txt
