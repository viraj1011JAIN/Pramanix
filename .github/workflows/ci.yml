# SPDX-License-Identifier: AGPL-3.0-only
# Pramanix CI Pipeline
#
# Jobs: lint → typecheck → test (matrix) → coverage gate
# Runs on: push to any branch, pull requests to main
# CRITICAL: Alpine base images are BANNED — Z3 requires glibc (see Blueprint §48)

name: Pramanix CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  FORCE_COLOR: "1"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # GATE: Reject Alpine base images in any Dockerfile
  # ──────────────────────────────────────────────────────────────────────────
  alpine-ban:
    name: Reject Alpine base images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Alpine base images
        run: |
          if grep -rq "FROM.*alpine" Dockerfile* docker/ 2>/dev/null; then
            echo "::error::FATAL: Alpine base image detected."
            echo "Alpine uses musl libc which breaks z3-solver native extensions."
            echo "Use python:3.11-slim (Debian-based) instead."
            exit 1
          fi
          echo "✓ No Alpine base images found."

  # ──────────────────────────────────────────────────────────────────────────
  # LINT: ruff check + ruff format --check
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format --check
        run: ruff format --check src/ tests/

  # ──────────────────────────────────────────────────────────────────────────
  # TYPECHECK: mypy --strict
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --with dev

      - name: mypy --strict
        run: mypy src/pramanix/ --strict

  # ──────────────────────────────────────────────────────────────────────────
  # TEST: pytest with coverage, across Python 3.10 / 3.11 / 3.12
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --with dev

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=pramanix \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # COVERAGE GATE: fail if coverage < 95% (on Python 3.11 only)
  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage gate (≥95%)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --with dev

      - name: Run tests with coverage enforcement
        run: |
          pytest tests/ \
            --cov=pramanix \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=95
